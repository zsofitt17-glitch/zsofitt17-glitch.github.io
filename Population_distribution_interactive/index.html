<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Helsinki Population Interactive</title>

<link rel="stylesheet" href="../style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
  body { margin: 0; font-family: sans-serif; }
  #map { height: 90vh; }
  .controls { padding: 10px; background: white; }
</style>
</head>

<body>

<header>
    <div class="page">
        <div class="topbar">
            <a class="site-title" href="../index.html">Thesis Portfolio</a>
            <nav aria-label="Main navigation">
                <a href="../index.html#about">About</a>
                <a href="../index.html#bike-data">Bike Data</a>
                <a href="../index.html#population-data">Population Distribution</a>
                <a href="../index.html#postal-code-data">Postal Code Data</a>
                <a href="../index.html#other-visualizations">Others</a>
            </nav>
        </div>
    </div>
</header>

<main class="page">
    <section>
        <div class="section-heading">
            <h2>Helsinki Population Distribution</h2>
            <p class="section-note">
                Interactive visualization of hourly population distribution by day type.
            </p>
        </div>

        <div class="visualization-frame">

            <div class="controls">
                Hour:
                <input type="range" id="hourSlider" min="0" max="23" value="9">
                <span id="hourLabel">9</span>
        
                Day:
                <select id="daySelect">
                    <option value="weekday">Weekday</option>
                    <option value="saturday">Saturday</option>
                    <option value="sunday">Sunday</option>
                </select>
            </div>
        
            <div id="map" class="map-container">
              <script>
              
              const map = L.map('map', {
                  renderer: L.canvas()  // IMPORTANT for performance
              }).setView([60.15, 24.91], 11);
              
              L.tileLayer(
                "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
                {
                  attribution: '&copy; OpenStreetMap & CartoDB'
                }
              ).addTo(map);
              

              let geojsonLayer;
              let geoData;
              
              const colorScale = (value) => {
                  if (value > 0.04) return "#800026";
                  if (value > 0.01) return "#BD0026";
                  if (value > 0.095) return "#E31A1C";
                  if (value > 0.08) return "#FC4E2A";
                  if (value > 0.005)  return "#FD8D3C";
                  if (value > 0.002)  return "#FEB24C";
                  if (value > 0.0005)   return "#FED976";
                  return "#FFEDA0";
              };
              

              fetch("helsinki_population.geojson")
              .then(res => res.json())
              .then(data => {
                  geoData = data;
                  drawLayer();
              });
              

              function getValue(feature) {
                  const hour = document.getElementById("hourSlider").value;
                  const day = document.getElementById("daySelect").value;
              
                  if (feature.properties.day_type !== day) return 0;
              
                  return feature.properties["H" + hour] || 0;
              }
              
              function style(feature) {
                  const value = getValue(feature);
              
                  return {
                      fillColor: colorScale(value),
                      weight: 0,
                      fillOpacity: 0.6
                  };
              }
              

              function drawLayer() {
                  geojsonLayer = L.geoJSON(geoData, {
                      style: style,
                      renderer: L.canvas()
                  }).addTo(map);
              }
              

              function update() {
                  document.getElementById("hourLabel").innerText =
                      document.getElementById("hourSlider").value;
              
                  geojsonLayer.setStyle(style);
              }
              

              document.getElementById("hourSlider").addEventListener("input", update);
              document.getElementById("daySelect").addEventListener("change", update);
              
              </script>
            </div>        
        </div>
    </section>
</main>

</body>
</html>
